<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram HTML Sender - Anime Vibe</title>
    <style>
        /* Base Reset & Font */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Anime Style Background - You can change the URL to your favorite wallpaper */
            background: url('https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=1920&auto=format&fit=crop') no-repeat center center/cover;
            color: #fff;
            overflow: hidden;
        }

        /* Glassmorphism Container */
        .glass-card {
            background: rgba(20, 20, 25, 0.4); /* Dark semi-transparent background */
            backdrop-filter: blur(16px); /* Glass effect */
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            animation: fadeIn 1s ease-in-out;
            position: relative;
            z-index: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 24px;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(to right, #ff8a00, #e52e71);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ddd;
        }

        /* Input Fields Styling */
        input[type="text"], textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        input[type="text"]:focus, textarea:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ff8a00;
            box-shadow: 0 0 10px rgba(255, 138, 0, 0.3);
        }

        /* File Input Styling */
        input[type="file"] {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed rgba(255, 255, 255, 0.4);
            border-radius: 10px;
            color: #ddd;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        input[type="file"]:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ff8a00;
        }

        /* Button Styling & Animation */
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff8a00, #e52e71);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(229, 46, 113, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(229, 46, 113, 0.6);
        }

        button:active {
            transform: scale(0.95); /* Click animation */
            box-shadow: 0 2px 10px rgba(229, 46, 113, 0.3);
        }

        /* Status Message */
        #statusMessage {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h2>Telegram Uploader</h2>
        
        <div class="input-group">
            <label for="botToken">Bot Token</label>
            <input type="text" id="botToken" placeholder="123456789:ABCdefGHIjklMNO...">
        </div>

        <div class="input-group">
            <label for="chatId">Channel ID or User Chat ID</label>
            <input type="text" id="chatId" placeholder="e.g. @yourchannel or -10012345678">
        </div>

        <div class="input-group">
            <label for="messageText">HTML Message (Parse Mode)</label>
            <textarea id="messageText" placeholder="<b>Bold Text</b>&#10;<i>Italic Text</i>&#10;<a href='https://example.com'>Link</a>"></textarea>
        </div>

        <div class="input-group">
            <label for="imageFile">Choose Image (Optional)</label>
            <input type="file" id="imageFile" accept="image/*">
        </div>

        <button id="sendBtn" onclick="sendToTelegram()">🚀 Send to Telegram</button>
        <p id="statusMessage"></p>
    </div>

    <script>
        async function sendToTelegram() {
            const botToken = document.getElementById('botToken').value.trim();
            const chatId = document.getElementById('chatId').value.trim();
            const messageText = document.getElementById('messageText').value.trim();
            const imageFile = document.getElementById('imageFile').files[0];
            const statusMsg = document.getElementById('statusMessage');
            const sendBtn = document.getElementById('sendBtn');

            // Validation
            if (!botToken || !chatId || !messageText) {
                showStatus("Please fill in Bot Token, Chat ID, and Message!", "#ff4757");
                return;
            }

            // Loading state
            sendBtn.innerText = "Sending...";
            sendBtn.style.opacity = "0.7";
            sendBtn.disabled = true;
            showStatus("Uploading... Please wait.", "#ffa502");

            try {
                let apiUrl, options;

                // Check if image is selected
                if (imageFile) {
                    // Send Photo with HTML caption
                    apiUrl = `https://api.telegram.org/bot${botToken}/sendPhoto`;
                    
                    const formData = new FormData();
                    formData.append('chat_id', chatId);
                    formData.append('photo', imageFile);
                    formData.append('caption', messageText);
                    formData.append('parse_mode', 'HTML');

                    options = {
                        method: 'POST',
                        body: formData
                    };
                } else {
                    // Send Text only with HTML parse mode
                    apiUrl = `https://api.telegram.org/bot${botToken}/sendMessage`;
                    
                    const payload = {
                        chat_id: chatId,
                        text: messageText,
                        parse_mode: 'HTML'
                    };

                    options = {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    };
                }

                // Send Request to Telegram API
                const response = await fetch(apiUrl, options);
                const result = await response.json();

                if (result.ok) {
                    showStatus("✨ Successfully uploaded!", "#2ed573");
                    document.getElementById('messageText').value = ""; // Clear message box
                    document.getElementById('imageFile').value = ""; // Clear file input
                } else {
                    showStatus(`❌ Error: ${result.description}`, "#ff4757");
                }
            } catch (error) {
                showStatus("❌ Failed to connect to Telegram API.", "#ff4757");
                console.error(error);
            } finally {
                // Reset Button state
                sendBtn.innerText = "🚀 Send to Telegram";
                sendBtn.style.opacity = "1";
                sendBtn.disabled = false;
            }
        }

        // Helper function to show status messages
        function showStatus(text, color) {
            const statusMsg = document.getElementById('statusMessage');
            statusMsg.innerText = text;
            statusMsg.style.color = color;
        }
    </script>
</body>
</html>
